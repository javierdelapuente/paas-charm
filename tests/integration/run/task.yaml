summary: integration tests

execute: |
    loginctl enable-linger ubuntu
    cd "${SPREAD_PATH}"
    PYTEST_CMD=$(opcli pytest expand -e "${TOX_ENV:-integration}" -- -k "$MODULE" --model testing) || exit 1
    runuser -l ubuntu -c "cd \"${SPREAD_PATH}\" && $PYTEST_CMD"
