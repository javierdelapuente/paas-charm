juju:
  channel: 3.6/stable
  model-defaults:
    test-mode: "true"
    automatically-retry-hooks: "false"

providers:
  lxd:
    enable: true
  microk8s:
    enable: true
    bootstrap: true
    channel: 1.34-strict/stable
    addons:
      - dns
      - hostpath-storage
      - ingress
      - registry
      - metallb:10.111.23.200-10.111.23.210

host:
  snaps:
    rockcraft:
      channel: latest/stable
